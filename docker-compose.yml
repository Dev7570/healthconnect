version: "3.8"

services:
  # 🧠 Python ML Service
  ml:
    build: ./healthconnect-ml
    container_name: healthconnect-ml
    ports:
      - "5001:5001"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5001/')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # 🗄️ MongoDB Database
  mongo:
    image: mongo:latest
    container_name: healthconnect-db
    ports:
      - "27017:27017"
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db

  # 🖥️ Node.js Backend (API Gateway)
  backend:
    build: ./healthconnect-backend
    container_name: healthconnect-backend
    ports:
      - "5000:5000"
    environment:
      - ML_API_URL=http://ml:5001
      - MONGO_URI=mongodb://mongo:27017/healthconnect
      - PORT=5000
    depends_on:
      ml:
        condition: service_healthy
      mongo:
        condition: service_started
    restart: unless-stopped

  # 🌐 React Frontend
  frontend:
    build: ./healthconnect
    container_name: healthconnect-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  mongo_data:
